<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="nib" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 圆角背景 - 100x100 留白 = 824 主体 -->
  <rect x="100" y="100" width="824" height="824" rx="170" ry="170" fill="url(#bg)" stroke="#e0e0e0" stroke-width="1"/>

  <!-- 笔尖主体 -->
  <g transform="translate(512,512) rotate(-45) translate(-512,-512)" filter="url(#shadow)">
    <!-- 笔尖形状 -->
    <path d="
      M 512 120
      C 512 120, 630 310, 665 420
      C 710 565, 665 740, 610 830
      Q 560 910, 512 920
      Q 464 910, 414 830
      C 359 740, 314 565, 359 420
      C 394 310, 512 120, 512 120
      Z
    " fill="url(#nib)"/>

    <!-- 笔尖中缝 -->
    <line x1="512" y1="190" x2="512" y2="870"
          stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

    <!-- 笔尖墨水孔 -->
    <circle cx="512" cy="490" r="18" fill="#ffffff" opacity="0.45"/>

    <!-- 笔尖分叉 -->
    <path d="M 512 870 Q 490 910 468 925" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
    <path d="M 512 870 Q 534 910 556 925" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- 墨水滴 -->
  <ellipse cx="630" cy="810" rx="14" ry="20" fill="#2d2d2d" opacity="0.18"
           transform="rotate(-45, 630, 810)"/>
</svg>
